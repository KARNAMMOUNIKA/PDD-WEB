name: Enterprise Flutter Appium 2.x Android Mobile E2E Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  mobile-e2e-tests:
    name: Run Appium 2.x Flutter Android APK Automation Suite
    runs-on: macos-13

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Setup Node.js (v18)
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: mobile-appium-tests/package-lock.json

      - name: 3. Setup Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 4. Setup Android SDK Environment
        uses: android-actions/setup-android@v3

      - name: 5 & 6. Create & Start Android Emulator (API 33 - Android 13)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: Pixel_6
          script: echo "Android Emulator started and ready for Appium 2.x automation!"

      - name: 7. Install Appium 2.x & Flutter Driver
        run: |
          npm install -g appium
          appium driver install flutter
          appium driver install uiautomator2

      - name: 8. Install Framework Node Dependencies
        working-directory: ./mobile-appium-tests
        run: npm ci || npm install

      - name: 9. Start Appium Server in Background
        run: |
          appium --log appium-server.log &
          sleep 5

      - name: 10 & 11. Run Appium E2E Mocha Test Suite & Generate Reports
        working-directory: ./mobile-appium-tests
        run: npm test

      - name: 12. Upload Test Artifacts (Excel Report, Mochawesome HTML, Screenshots & Logs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Flutter-Mobile-E2E-Test-Reports
          path: |
            mobile-appium-tests/reports/Flutter_E2E_Report.xlsx
            mobile-appium-tests/reports/index.html
            mobile-appium-tests/reports/index.json
            mobile-appium-tests/reports/failures/
            mobile-appium-tests/reports/logs/
