name: Selenium Web E2E Automated Test Suite

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  selenium-web-e2e-tests:
    name: Run Selenium Headless Chrome E2E Suite
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Setup Node.js (v18)
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: selenium-tests/package-lock.json

      - name: 3. Install Framework Node Dependencies
        working-directory: ./selenium-tests
        run: npm ci || npm install

      - name: 4. Run Selenium E2E Tests (Headless Chrome)
        working-directory: ./selenium-tests
        run: npm run test:headless

      - name: 5. Upload Selenium Test Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-Web-E2E-Test-Report
          path: selenium-tests/Selenium_E2E_Test_Report.xlsx
